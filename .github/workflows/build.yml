name: Build APKs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

       # expo only loads env variables from .env file (or its variants), so we need to create it
      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SKYHELPER_CDN=${{ secrets.EXPO_PUBLIC_SKYHELPER_CDN }}" >> .env

      - name: Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
          NODE_ENV: production

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/release-key.keystore

      # enable ABI splits
      - name: Enable ABI splits
        run: |
          sed -i '/android {/a\
              splits {\
                  abi {\
                      enable true\
                      reset()\
                      include "armeabi-v7a", "arm64-v8a"\
                      universalApk false\
                  }\
              }' android/app/build.gradle

      - name: Build APKs
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Set release variables
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=manual-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "title=Manual Build #${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "title=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.REPO_TOKEN }}"
          automatic_release_tag: ${{ steps.vars.outputs.tag }}
          prerelease: true
          title: ${{ steps.vars.outputs.title }}
          files: |
            android/app/build/outputs/apk/release/*.apk